<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive-text — Image-aware Text Layout</title>
    <link rel="stylesheet" href="src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div id="toolbar">
        <div class="toolbar-brand">
            <span class="brand-title">responsive-text</span>
        </div>
        <div class="toolbar-controls">
            <label class="file-label" for="fileInput">
                ⊕ Add Image (PNG)
            </label>
            <input type="file" id="fileInput" accept="image/png">
        </div>
        <div class="toolbar-hint">Drag the image to reflow text around it</div>
    </div>

    <main id="stage">
        <div id="container">
            <div id="render-area"></div>
            <!-- Draggable image is injected here by layout.js -->
        </div>
    </main>

    <footer id="status-bar">
        <span id="debug-info">Ready.</span>
    </footer>

    <script type="module" src="src/main.js"></script>
</body>
</html>
